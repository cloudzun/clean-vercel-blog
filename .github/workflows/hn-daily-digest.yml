name: HN Daily Digest

on:
  schedule:
    - cron: '14 22 * * *'  # 北京时间每天 06:14 (UTC 22:14)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate and publish HN digest
        env:
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          POSTS_DIR: content/posts
          GITHUB_ACTIONS: true
        run: node .github/scripts/generate-improved.js
